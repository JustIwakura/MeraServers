<!DOCTYPE html>
<html>
<head>
    <title>Пример</title>
</head>
<body>

    <!-- Твоя кнопка -->
    <button id="myButton">Нажми меня</button>

    <script>
        // Функция для получения параметра serv из URL
        function getServParam() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('serv');
        }

        // Берём значение serv
        const servValue = getServParam();

        // Если параметр есть — меняем текст кнопки
        if (servValue) {
            const button = document.getElementById('myButton');
            button.textContent = servValue;  // Меняем текст на кнопке
            
            // Или можно сделать так, чтобы при клике выводилось значение
            button.onclick = function() {
                alert('Значение serv: ' + servValue);
                // Или любое другое действие с servValue
            };
        }
    </script>

</body>
</html>
